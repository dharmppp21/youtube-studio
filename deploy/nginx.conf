# nginx site config for YouTube Creator Studio
# Tested on Ubuntu 22.04 / 24.04 with nginx >= 1.18
#
# Install:    sudo cp deploy/nginx.conf /etc/nginx/sites-available/youtube-studio
#             sudo ln -s /etc/nginx/sites-available/youtube-studio /etc/nginx/sites-enabled/
#             sudo rm -f /etc/nginx/sites-enabled/default
#             sudo nginx -t && sudo systemctl reload nginx
#
# IP-only mode (no domain yet): browser will warn about self-signed cert.
# Once you have a domain, replace the ssl_certificate lines with certbot ones:
#             sudo apt install python3-certbot-nginx
#             sudo certbot --nginx -d YOUR.DOMAIN.COM

# Upstream: the Express server built by `npm run build`.
# Listens on localhost:3000, only reachable from this box.
upstream youtube_studio_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate-limit zone for /api/* to keep Gemini costs bounded.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# HTTP -> HTTPS redirect (only meaningful once you have a domain + cert).
# Comment this server block out if you're running IP-only without TLS.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge path for certbot (when you add a domain later).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Self-signed cert quickstart (IP-only mode): uncomment the next two lines
    # AFTER you've generated a self-signed cert once:
    #     sudo mkdir -p /etc/nginx/ssl
    #     sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #         -keyout /etc/nginx/ssl/selfsigned.key \
    #         -out /etc/nginx/ssl/selfsigned.crt \
    #         -subj "/CN=$host"
    # Then enable the HTTPS server block below and reload nginx.

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (with self-signed cert for IP-only mode).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # Self-signed cert paths — change if you swap to a real certbot cert later.
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Allow slightly larger uploads in case you later add file uploads.
    client_max_body_size 25m;

    # Security headers — Firebase Auth and YouTube APIs are fine with these.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Static + SPA: serve the built assets, fall back to index.html for client routes.
    root /home/deploy/app/dist;
    index index.html;

    location /assets/ {
        # Vite emits hashed filenames under /assets/, safe to cache forever.
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API endpoints hit the Express server.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://youtube_studio_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gemini calls can take 5–10s; don't let nginx kill the connection.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Everything else (including "/" and unknown paths): SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Plain HTTP-only fallback for IP-only mode (no cert yet).
# Use this if you haven't generated the self-signed cert above.
